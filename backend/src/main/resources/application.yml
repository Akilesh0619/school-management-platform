spring:
  application:
    name: school-management-system
  
  # Database Configuration reading Railway injected environment variables directly
  datasource:
    url: jdbc:mysql://${MYSQLHOST:${SPRING_DATASOURCE_HOST:localhost}}:${MYSQLPORT:${SPRING_DATASOURCE_PORT:3306}}/${MYSQLDATABASE:${SPRING_DATASOURCE_DB:school_db}}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${MYSQLUSER:${SPRING_DATASOURCE_USERNAME:root}}
    password: ${MYSQLPASSWORD:${SPRING_DATASOURCE_PASSWORD:password}}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      initialization-fail-timeout: -1
  
  # JPA / Hibernate Configuration
  jpa:
    hibernate:
      ddl-auto: none # Let Flyway handle the migrations
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  
  # Flyway Migrations
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration
    connect-retries: 10
  
  # Redis Cache & Session Configuration supporting Railway Redis
  data:
    redis:
      host: ${SPRING_REDIS_HOST:${REDISHOST:localhost}}
      port: ${SPRING_REDIS_PORT:${REDISPORT:6379}}
      password: ${SPRING_REDIS_PASSWORD:${REDISPASSWORD:}}
  
  # Email Configuration
  mail:
    host: ${SPRING_MAIL_HOST:smtp.gmail.com}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:your-email@gmail.com}
    password: ${SPRING_MAIL_PASSWORD:your-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
  
  # Servlet File Upload limits
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

# Actuator Health Check Configuration
management:
  endpoints:
    web:
      exposure:
        include: "health,info"
  endpoint:
    health:
      show-details: always
  health:
    mail:
      enabled: false  # Prevent unconfigured SMTP from failing health checks (503)
    redis:
      enabled: false # Prevent optional Redis connection loss from failing health checks (503)
    db:
      enabled: true
    diskspace:
      enabled: true

# Server Configuration
server:
  address: 0.0.0.0
  port: ${PORT:8080}
  error:
    include-message: always

# JWT Settings
jwt:
  secret: ${JWT_SECRET:407F164098A33E2B6D4C697F296D8E38753246726F82479426E86F76E2A3F452}
  access-token-expiration: 900000     # 15 minutes in milliseconds
  refresh-token-expiration: 604800000 # 7 days in milliseconds

# Application Settings
app:
  upload-dir: ${UPLOAD_DIR:uploads}
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  security:
    rate-limit:
      capacity: 100
      tokens-per-fill: 100
      fill-period-seconds: 60
    account-lock:
      max-attempts: 5
      lock-duration-minutes: 15
    password-policy:
      min-length: 8
      require-uppercase: true
      require-lowercase: true
      require-digit: true
      require-special: true
