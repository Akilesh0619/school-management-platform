version: '3.8'

services:
  mysqldb:
    image: mysql:8.0
    container_name: school_mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: school_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:alpine
    container_name: school_redis
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: school_backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysqldb:3306/school_db?createDatabaseIfNotExist=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_REDIS_HOST: redis
    depends_on:
      - mysqldb
      - redis

  frontend:
    build: ./frontend
    container_name: school_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  mysql_data:
